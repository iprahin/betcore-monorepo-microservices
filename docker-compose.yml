services:
    postgres:
        image: postgres:16-alpine
        container_name: betcore-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-betcore}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betcore}
            POSTGRES_DB: ${POSTGRES_DB:-betcore}
        ports:
            - '5432:5432'
        volumes:
            - betcore_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-betcore} -d ${POSTGRES_DB:-betcore}']
            interval: 5s
            timeout: 3s
            retries: 20

    redis:
        image: redis:7-alpine
        container_name: betcore-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 20

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: betcore-rabbitmq
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-betcore}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-betcore}
        ports:
            - '5672:5672'
            - '15672:15672'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_listener 5672',
                ]
            interval: 5s
            timeout: 10s
            retries: 30
            start_period: 15s

    api:
        build:
            context: .
            dockerfile: docker/node.Dockerfile
            target: api
        image: betcore-api:local
        container_name: betcore-api
        restart: unless-stopped
        env_file:
            - .env
        environment:
            PORT: 3000
            RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-betcore}:${RABBITMQ_DEFAULT_PASS:-betcore}@rabbitmq:5672
            SPORTS_QUEUE: ${SPORTS_QUEUE:-sports.queue}
        ports:
            - '3000:3000'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'node -e "fetch(''http://127.0.0.1:3000/api/health/live'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
                ]
            interval: 10s
            timeout: 3s
            retries: 20

    line-worker:
        build:
            context: .
            dockerfile: docker/node.Dockerfile
            target: line-worker
        image: betcore-line-worker:local
        container_name: betcore-line-worker
        restart: unless-stopped
        env_file:
            - .env
        environment:
            LINE_WORKER_HEALTH_PORT: 3001
            RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-betcore}:${RABBITMQ_DEFAULT_PASS:-betcore}@rabbitmq:5672
            SPORTS_QUEUE: ${SPORTS_QUEUE:-sports.queue}
        ports:
            - '3001:3001'
        depends_on:
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'node -e "fetch(''http://127.0.0.1:3001/health/live'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
                ]
            interval: 10s
            timeout: 3s
            retries: 20

volumes:
    betcore_postgres_data:
